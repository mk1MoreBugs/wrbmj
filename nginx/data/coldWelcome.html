<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cold Welcome</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e3f2fd 0%, #f3e5f5 100%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #37474f;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 3rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            border: 1px solid #e1f5fe;
        }
        h1 {
            color: #0277bd;
            font-size: 2.5rem;
            margin-bottom: 1rem;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
        }
        .subtitle {
            font-size: 1.2rem;
            color: #546e7a;
            margin-bottom: 2rem;
            font-style: italic;
        }
        .message {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        .ice-emoji {
            font-size: 3rem;
            margin: 1rem 0;
        }
        .button {
            background: #0288d1;
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: all 0.3s ease;
            display: inline-block;
        }
        .button:hover {
            background: #0277bd;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="ice-emoji">❄️</div>
        <h1>Cold Welcome</h1>
        <div class="subtitle">A Chilly Reception Awaits</div>
        <div class="message">
            <p>It seems you've stumbled upon our frosty greeting page.</p>
            <p>Don't worry, the atmosphere warms up once you get to know us!</p>
        </div>
        <a href="/" class="button">Warm Up on Home Page</a>
    </div>
</body>
</html>
